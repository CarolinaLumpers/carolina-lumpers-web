<!DOCTYPE html>
<html lang="en">

<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3032955456184358"
    crossorigin="anonymous"></script>

  <!-- Cache Version Control - Update this timestamp when deploying -->
  <script>

  </script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JPETF03TJ0"></script>

    gtag('config', 'G-JPETF03TJ0');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-en="Employee Sign Up | Carolina Lumper Service" data-es="Registro de Empleado | Carolina Lumper Service"
    data-pt="Cadastro de Funcionário | Carolina Lumper Service">
    Employee Sign Up | Carolina Lumper Service
  </title>

  <link rel="icon" type="image/png" href="assets/CLS-favicon.png">
  <link rel="manifest" href="manifest-employee.json">
  <meta name="theme-color" content="#ffcc00">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Oswald:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- iOS PWA Support -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CLS Employee">
  <link rel="apple-touch-icon" href="assets/CLS-icon-192.png">

  <link rel="stylesheet" href="css/index-fresh-variant.css?v=20260423-a2">
  <link rel="stylesheet" href="css/variant-a-priority1-modules.css?v=20260423-p1mods-a47">
  <link rel="stylesheet" href="css/auth-pages-shared.css?v=20260513-auth-fix2">

  <style>
    body.variant-a[data-page="signup"] {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body.variant-a[data-page="signup"] > main {
      width: min(1180px, calc(100% - 2rem));
      margin-inline: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding-bottom: 2rem;
    }

    body.variant-a[data-page="signup"] .signup-hero {
      align-items: center;
      min-height: clamp(420px, 54vh, 560px);
      padding-bottom: 0;
      margin-bottom: 0;
    }

    body.variant-a[data-page="signup"] .signup-hero .hero-content {
      align-content: center;
      gap: 0.85rem;
    }

    body.variant-a[data-page="signup"] .signup-hero .hero-content h1 {
      margin: 0;
      max-width: 14ch;
      color: #ffffff;
      font-size: clamp(2rem, 4.2vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    body.variant-a[data-page="signup"] .signup-hero .hero-content .hero-subtitle {
      max-width: 56ch;
      color: #ececec;
    }

    body.variant-a[data-page="signup"] .signup-form {
      align-self: center;
      margin: 0;
      border: 1px solid #ffffff22;
      background: #ffffff;
      color: #171717;
      box-shadow: var(--p1-shadow);
      padding: clamp(1.2rem, 2vw, 1.9rem);
      border-radius: var(--p1-radius);
      width: min(560px, 100%);
    }

    body.variant-a[data-page="signup"] .signup-form input {
      width: 100%;
      margin: 0.5rem 0;
      padding: 0.75rem 1rem;
      border: 1px solid #d0d0d0;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-family: inherit;
    }

    body.variant-a[data-page="signup"] .signup-form input:focus {
      outline: none;
      border-color: #ffbf00;
      box-shadow: 0 0 0 2px #ffbf0022;
    }

    body.variant-a[data-page="signup"] .signup-form button {
      background: #ffbf00;
      color: #1a1a1a;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    body.variant-a[data-page="signup"] .signup-form button:hover:not(:disabled) {
      background: #e6aa00;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
    }

    body.variant-a[data-page="signup"] .signup-form button:disabled {
      background: #d0d0d0;
      color: #999;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>

<body class="variant-a" data-page="signup">
  <!-- NAVBAR -->
  <div id="navbar-container"></div>

  <main>
    <!-- HERO SECTION -->
    <section class="signup-hero">
      <div class="hero-content">
        <p class="meta" data-en="Employee registration" data-es="Registro de empleado" data-pt="Registro de funcionário">
          Employee registration
        </p>
        <h1 data-en="Create Your Account" data-es="Crea Tu Cuenta" data-pt="Crie Sua Conta">Create Your Account</h1>
        <p class="hero-subtitle" data-en="Set up your login credentials to clock in and track your shifts."
          data-es="Configura tus credenciales de inicio de sesión para registrar entrada y rastrear tus turnos."
          data-pt="Configure suas credenciais de login para fazer check-in e rastrear seus turnos.">
          Set up your login credentials to clock in and track your shifts.
        </p>
      </div>
    </section>

    <!-- SIGNUP FORM CARD -->
    <form id="signupForm" class="signup-form" method="POST"
      action="https://script.google.com/macros/s/AKfycbwHBLEQ5QHuhD-O4uI4hRN_5_yS9YsFgtn_dMAdoAO2C7zHLoi3qfHO82vas3Uv0wXXpg/exec">

      <input type="hidden" name="action" value="signup">

      <!-- Email Field -->
      <div style="margin: 0.5rem 0;">
        <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.95rem;"
          data-en="Work Email" data-es="Correo de Trabajo" data-pt="Email de Trabalho">Work Email</label>
        <input type="email" id="email" name="email" required
          data-en="Work Email" data-es="Correo de Trabajo" data-pt="Email de Trabalho"
          style="width: 100%; padding: 0.75rem 1rem; border: 1px solid #d0d0d0; border-radius: 0.375rem; font-size: 1rem;">
      </div>

      <!-- Create Password Field with Eye Toggle -->
      <div style="margin: 1rem 0 0.5rem 0;">
        <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.95rem;"
          data-en="Create Password" data-es="Crear Contraseña" data-pt="Criar Senha">Create Password</label>
        <div class="password-field">
          <input type="password" id="password" name="password" required
            data-en="Create Password" data-es="Crear Contraseña" data-pt="Criar Senha"
            style="width: 100%; padding: 0.75rem 1rem; padding-right: 2.5rem; border: 1px solid #d0d0d0; border-radius: 0.375rem; font-size: 1rem;">
          <button type="button" class="password-toggle" data-target="password"
            aria-label="Toggle password visibility" title="Toggle password visibility">👁</button>
        </div>
        <p class="password-policy-hint" data-en="Password must be at least 10 characters with uppercase, lowercase, and numbers."
          data-es="La contraseña debe tener al menos 10 caracteres con mayúsculas, minúsculas y números."
          data-pt="A senha deve ter pelo menos 10 caracteres com maiúsculas, minúsculas e números.">
          Password must be at least 10 characters with uppercase, lowercase, and numbers.
        </p>
        <div class="password-strength">
          <div class="password-strength__bar">
            <div class="password-strength__fill"></div>
          </div>
          <div class="password-strength__label"></div>
        </div>
      </div>

      <!-- Confirm Password Field with Eye Toggle -->
      <div style="margin: 1rem 0;">
        <label for="confirmPassword" style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.95rem;"
          data-en="Confirm Password" data-es="Confirmar Contraseña" data-pt="Confirmar Senha">Confirm Password</label>
        <div class="password-field">
          <input type="password" id="confirmPassword" name="confirmPassword" required
            data-en="Confirm Password" data-es="Confirmar Contraseña" data-pt="Confirmar Senha"
            style="width: 100%; padding: 0.75rem 1rem; padding-right: 2.5rem; border: 1px solid #d0d0d0; border-radius: 0.375rem; font-size: 1rem;">
          <button type="button" class="password-toggle" data-target="confirmPassword"
            aria-label="Toggle password visibility" title="Toggle password visibility">👁</button>
        </div>
        <div class="password-mismatch" id="passwordMismatch"
          data-en="Passwords do not match" data-es="Las contraseñas no coinciden"
          data-pt="As senhas não correspondem">
          ❌ Passwords do not match
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" data-en="Create Account" data-es="Crear Cuenta" data-pt="Criar Conta"
        style="width: 100%; margin-top: 1.5rem; padding: 0.75rem 1rem; background: #ffbf00; color: #1a1a1a; font-weight: 600; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 1rem; transition: all 0.3s ease;">
        Create Account
      </button>

      <!-- Status Message -->
      <p id="status" role="status" aria-live="polite"
        style="margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 0.375rem; display: none; font-size: 0.95rem; font-weight: 500;"></p>
    </form>

    <!-- Login Link -->
    <div style="text-align: center; margin-top: 1.5rem;">
      <p style="margin: 0; font-size: 0.95rem;">
        <span data-en="Already have an account?" data-es="¿Ya tienes una cuenta?" data-pt="Já tem uma conta?">
          Already have an account?
        </span>
        <a href="employeelogin.html" data-en="Login here" data-es="Inicia sesión aquí" data-pt="Entre aqui"
          style="color: #ffbf00; text-decoration: none; font-weight: 500; margin-left: 0.5rem;">
          Login here
        </a>
      </p>
    </div>

    <!-- Feature Strip -->
    <div id="feature-strip-container" style="margin-top: 2rem;"></div>
  </main>

  <!-- FOOTER -->
  <div id="footer-container"></div>

  <!-- Main signup logic -->
  <script src="js/script.js?v=20260513-auth-fix2" defer></script>
  <!-- Feature strip renderer -->
  <script src="js/auth-feature-strip.js?v=20260513-auth-fix2" defer></script>
  <!-- Cache buster utility -->
  <script src="js/cache-buster.js?v=2025-11-04" defer></script>
</body>

</html>
